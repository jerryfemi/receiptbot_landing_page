<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remi Promo Flyer - AI Image Parsing</title>
    <!-- Tailwind via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Plus Jakarta Sans & Inter -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap"
        rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bgDark: '#0A0F1E',
                        bgCard: '#111827',
                        accent: '#00D4A1',
                        textPrimary: '#F1F5F9',
                        textSecondary: '#94A3B8',
                        textMuted: '#64748B',
                        borderStroke: 'rgba(255,255,255,0.08)',
                    },
                    fontFamily: {
                        heading: ['"Plus Jakarta Sans"', 'sans-serif'],
                        body: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <style>
        /* Essential Remi Utilities */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0A0F1E;
            color: #F1F5F9;
            /* Creating the exact 1080x1080 square for social */
            width: 1080px;
            height: 1080px;
            position: relative;
            overflow: hidden;
            background-image: radial-gradient(ellipse at 50% 0%, rgba(0, 212, 161, 0.15) 0%, transparent 60%);
        }

        .glass-card {
            background: #111827;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
        }

        .accent-glow {
            color: #00D4A1;
            text-shadow: 0 0 20px rgba(0, 212, 161, 0.4);
        }

        /* The placeholder dashed boxes for Figma */
        .image-placeholder {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.02);
            border-radius: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748B;
            font-weight: 500;
        }

        .floating-tag {
            background: rgba(17, 24, 39, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .floating-tag:after {
            content: '';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 30px;
            height: 2px;
            background: rgba(0, 212, 161, 0.5);
            z-index: -1;
        }
        
        .floating-tag.left-tag:after {
            right: -30px;
        }
        
        .floating-tag.right-tag:after {
            left: -30px;
        }

        .accent-icon {
            background: rgba(0, 212, 161, 0.12);
            color: #00D4A1;
            padding: 12px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body class="flex flex-col p-[60px] items-center">

    <!-- Top Headline -->
    <header class="flex flex-col items-center text-center mt-6 z-20 w-full mb-8">
        <h2
            class="font-heading font-extrabold text-[28px] tracking-tight mb-4 uppercase tracking-widest text-accent">
            AI Superpower
        </h2>

        <h1 class="font-heading font-extrabold text-[72px] leading-[1.05] tracking-tight max-w-[900px]">
            Zero <span class="accent-glow">Typing</span> Mode
        </h1>
        <p class="text-textSecondary text-[22px] mt-6 max-w-[700px] font-medium leading-relaxed">
            Snap a photo of your messy notes or a screenshot. Remi’s AI extracts everything into a clean receipt.
        </p>
    </header>

    <!-- Main Visual Area (Two Phone Mockups Side-by-Side) -->
    <main class="flex-1 flex items-center justify-center w-full relative">

        <!-- Phone 1: Photo/Screenshot -->
        <div class="relative z-10">
            <div class="image-placeholder w-[320px] h-[660px] shadow-[0_30px_60px_rgba(0,0,0,0.5)] z-20 glass-card transform -rotate-3 hover:rotate-0 transition-transform duration-300">
                <div class="flex flex-col items-center text-center gap-2 px-6">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" class="text-textMuted mb-2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
                    <span class="text-lg">DROP 'MESSY_PHOTO.PNG' HERE</span>
                </div>
            </div>

            <!-- Left Tag 1 -->
            <div class="absolute top-[30%] left-tag floating-tag z-30 transform -rotate-2 w-max" style="right: calc(100% + 20px);">
                <div class="accent-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                </div>
                <div class="flex flex-col text-left">
                    <span class="text-[14px] text-textSecondary font-semibold uppercase tracking-wider mb-0.5">Step 1</span>
                    <span class="text-[20px] text-white font-heading font-bold">Snap or Upload</span>
                </div>
            </div>
        </div>

        <!-- Center Divider / Arrow -->
        <div class="mx-12 z-0 relative flex flex-col items-center justify-center">
            <div class="w-16 h-16 rounded-full glass-card flex items-center justify-center shadow-[0_0_30px_rgba(0,212,161,0.2)] border border-accent/20">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#00D4A1" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                </svg>
            </div>
            <div class="absolute top-1/2 left-[-100px] right-[-100px] h-0.5 bg-gradient-to-r from-transparent via-accent/30 to-transparent -z-10 transform -translate-y-1/2"></div>
        </div>

        <!-- Phone 2: Clean Receipt -->
        <div class="relative z-10">
            <div class="image-placeholder w-[320px] h-[660px] shadow-[0_30px_60px_rgba(0,0,0,0.5)] z-20 glass-card transform rotate-3 hover:rotate-0 transition-transform duration-300">
                <div class="flex flex-col items-center text-center gap-2 px-6">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" class="text-textMuted mb-2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                    <span class="text-lg">DROP 'CLEAN_RECEIPT.PNG' HERE</span>
                </div>
            </div>
            
            <!-- Right Tag 1 -->
            <div class="absolute top-[60%] right-tag floating-tag z-30 transform rotate-1 w-max" style="left: calc(100% + 20px);">
                <div class="accent-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                </div>
                <div class="flex flex-col text-left">
                    <span class="text-[14px] text-textSecondary font-semibold uppercase tracking-wider mb-0.5">Step 2</span>
                    <span class="text-[20px] text-white font-heading font-bold">AI Extracts Data</span>
                </div>
            </div>
        </div>

    </main>

</body>

</html>
